<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light">
<title>예배 출석 보고</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">
<style>
  :root {
    --navy:      #1c3254;
    --navy-mid:  #3b5a8c;
    --gold:      #b8892e;
    --pale:      #f0ede5;
    --border:    #d6d1c3;
    --ink:       #1c3254;
    --ink-s:     #6e6a61;
    --bg:        #f8f7f4;
    --white:     #ffffff;
    --red:       #A32D2D;
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: #f8f7f4; color-scheme: light; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; color-scheme: light; }
  input, select, textarea { color-scheme: light; }

  /* HEADER */
  .hdr {
    background: var(--navy);
    padding: 13px 18px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(28,50,84,.2);
    overflow: hidden;
  }
  .hdr::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }
  /* 관리자/수정 모드에서는 메인 헤더 골드 바 숨김 (관리자 헤더와 연결되므로) */
  body.admin-mode .hdr::after,
  body.edit-mode .hdr::after { display: none; }
  .hdr-bar {
    width: 4px; height: 36px;
    background: var(--gold);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .hdr-t h1 { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -.2px; }
  .hdr-t p  { font-size: 10px; color: rgba(255,255,255,.6); margin-top: 1px; letter-spacing: .4px; }

  /* WRAP */
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }

  /* STEP CARD */
  .step {
    background: var(--white);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(28,50,84,.08);
    border: 1px solid var(--border);
    position: relative;
  }
  .step-num {
    position: absolute; top: 16px; right: 16px;
    font-size: 11px; font-weight: 700;
    color: var(--border);
    letter-spacing: .5px;
  }
  .step-label {
    font-size: 10.5px; font-weight: 700;
    color: var(--ink-s);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* INPUTS */
  .inp, .sel {
    width: 100%;
    padding: 11px 13px;
    font-size: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    color: var(--ink);
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    appearance: none; -webkit-appearance: none;
  }
  .inp:focus, .sel:focus {
    border-color: var(--navy-mid);
    box-shadow: 0 0 0 3px #e7ebf2;
    background: var(--white);
  }
  .inp[readonly] { color: var(--ink-s); background: var(--bg); cursor: default; }
  .sel-wrap { position: relative; }
  .sel-wrap::after {
    content: "▾"; position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--ink-s);
    pointer-events: none; font-size: 13px;
  }

  /* COUNT GRID */
  .cnt-grid { display: grid; gap: 10px; }
  .cnt-grid.g1 { grid-template-columns: 1fr; }
  .cnt-grid.g2 { grid-template-columns: 1fr 1fr; }
  .cnt-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .cnt-item label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--ink-s); margin-bottom: 5px;
    text-align: center; letter-spacing: .3px;
  }
  .cnt-inp {
    width: 100%;
    padding: 12px 6px;
    font-size: 22px; font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    color: var(--navy);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    outline: none;
    text-align: center;
    transition: border-color .15s, box-shadow .15s;
  }
  .cnt-inp:focus {
    border-color: var(--navy-mid);
    box-shadow: 0 0 0 3px #e7ebf2;
    background: var(--white);
  }

  /* SIGNATURE */
  .sig-box {
    border: 1.5px solid var(--border);
    border-radius: 9px; overflow: hidden;
  }
  .sig-inp {
    width: 100%; padding: 14px;
    font-size: 20px; font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    color: var(--navy);
    background: var(--white);
    border: none; outline: none;
    text-align: center; letter-spacing: 3px;
  }
  .sig-inp:focus { background: var(--white); }
  .sig-line {
    border-top: 1px solid var(--border);
    padding: 6px 14px; font-size: 10px;
    color: var(--ink-s); text-align: center;
    letter-spacing: .4px;
  }

  .cnt-grid.g2-total { grid-template-columns: 1fr 1fr; }
  .cnt-grid.g3-total { grid-template-columns: 1fr 1fr 1fr; }
  .cnt-total-row {
    grid-column: 1 / -1;
    border-top: 1.5px dashed var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }
  .cnt-total-disp {
    background: var(--navy) !important;
    color: #fff !important;
    border-color: var(--navy) !important;
    font-size: 24px !important;
    letter-spacing: 1px;
    cursor: default;
  }
  .cnt-total-disp:focus {
    box-shadow: none !important;
  }

  /* SUBMIT */
  .btn-sub {
    width: 100%; padding: 16px;
    font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-weight: 800; color: #fff;
    background: var(--navy); border: none;
    border-left: 5px solid var(--gold);
    border-radius: 14px; cursor: pointer;
    letter-spacing: .3px;
    transition: background .15s, transform .1s;
    box-shadow: 0 4px 18px rgba(28,50,84,.25);
    margin-top: 4px;
    text-align: center;
  }
  .btn-sub:active { transform: scale(.98); background: var(--navy-mid); }
  .btn-sub:disabled { background: #9AAFD4; cursor: not-allowed; transform: none; }

  /* SUCCESS */
  .success { display: none; text-align: center; padding: 50px 20px; }
  .success-icon { font-size: 60px; margin-bottom: 16px; }
  .success h2 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .success p  { font-size: 14px; color: var(--ink-s); line-height: 1.7; margin-bottom: 28px; }
  .btn-again {
    display: inline-block; padding: 13px 30px;
    font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-weight: 600; color: var(--navy);
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy); color: #fff;
    padding: 12px 22px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    white-space: nowrap;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999; pointer-events: none;
    box-shadow: 0 4px 18px rgba(28,50,84,.32);
  }
  .toast.show  { transform: translateX(-50%) translateY(0); }
  .toast.ok    { background: #2E6B3E; }
  .toast.err   { background: var(--red); }

  /* ADMIN FAB */
  .fab {
    position: fixed; bottom: 24px; right: 18px;
    width: 42px; height: 42px;
    background: rgba(28,50,84,.1);
    border: none; border-radius: 50%;
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50; transition: background .2s;
  }
  .fab:hover { background: rgba(28,50,84,.2); }

  /* ADMIN MODAL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(28,50,84,.5);
    backdrop-filter: blur(4px); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  /* 비밀번호 모달: 화면 중앙 */
  .overlay.center-modal {
    align-items: center;
  }
  .overlay.center-modal .sheet {
    border-radius: 16px;
    max-width: 360px;
    padding: 28px 24px 24px;
  }
  .overlay.center-modal .handle { display: none; }
  .sheet {
    background: var(--white); border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px; width: 100%;
    max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .sheet h3 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
  .modal-inp {
    width: 100%; padding: 11px 13px;
    font-size: 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    border: 1.5px solid var(--border); border-radius: 9px;
    outline: none; margin-bottom: 12px; background: var(--white);
  }
  .modal-inp:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px #e7ebf2; background: var(--white); }
  .btn-conf {
    width: 100%; padding: 14px;
    font-size: 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-weight: 700; color: #fff;
    background: var(--navy); border: none;
    border-left: 5px solid var(--gold);
    border-radius: 10px; cursor: pointer;
  }

  /* TABS */
  .adm-tabs {
    display: flex; background: var(--bg);
    border-bottom: 1.5px solid var(--border);
  }
  .adm-tab {
    flex: 1; padding: 13px 6px;
    font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    font-weight: 600; color: var(--ink-s);
    background: none; border: none; cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
    letter-spacing: -.2px;
  }
  .adm-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* DATE PICKER */
  .date-pick-wrap { margin-bottom: 16px; }
  .pick-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--ink-s); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 7px;
  }
  .pick-inp { font-size: 16px !important; background: var(--white) !important; }

  /* SUMMARY TABLE */
  .sum-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(28,50,84,.08);
    margin-bottom: 14px;
  }
  .sum-card-hdr {
    background: #d4dff0; color: var(--navy);
    padding: 12px 16px; font-size: 13px; font-weight: 700;
    letter-spacing: .2px;
    display: flex; align-items: center; gap: 8px;
  }
  .sum-card-hdr::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--navy);
    flex-shrink: 0;
  }
  .sum-row {
    display: flex; align-items: center;
    padding: 13px 16px; border-bottom: 1px solid var(--bg);
    gap: 10px;
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-svc {
    flex: 1; font-size: 14px; font-weight: 600; color: var(--ink);
  }
  .sum-cnt {
    font-size: 18px; font-weight: 800; color: var(--navy);
    min-width: 48px; text-align: right;
  }
  .sum-detail {
    font-size: 11px; color: var(--ink-s);
    text-align: right; line-height: 1.6;
  }
  .sum-missing {
    font-size: 13px; font-weight: 600;
    color: #B0B8CC; font-style: italic;
  }
  .sum-sig {
    font-size: 11px; color: var(--ink-s); margin-left: 2px;
  }
  .sum-total-row {
    background: var(--bg);
    display: flex; align-items: center;
    padding: 14px 16px; gap: 10px;
  }
  .sum-total-row .sum-svc {
    font-size: 13px; font-weight: 700; color: var(--navy);
  }
  .sum-total-row .sum-cnt {
    font-size: 20px; color: var(--navy);
  }

  /* ADMIN BODY */
  .adm-hdr {
    background: var(--navy); color: #fff;
    padding: 13px 18px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .adm-hdr::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }
  .adm-hdr h2 { font-size: 15px; font-weight: 700; }
  .btn-out {
    font-size: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    color: rgba(255,255,255,.8);
    background: rgba(255,255,255,.12);
    border: none; padding: 6px 12px;
    border-radius: 6px; cursor: pointer;
  }
  .btn-secret {
    width: 14px; height: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 3px;
    cursor: default;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secret.active {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.04);
  }
  /* 수정 버튼: 기본 숨김 */
  .btn-edit { display: none; }
  /* 삭제 버튼: 기본 숨김 */
  .btn-del-sm { display: none; }
  /* 관리자 모드 활성화 시 보임 */
  body.admin-mode .btn-edit { display: inline-block; }
  body.admin-mode .btn-del-sm { display: inline-block; }
  /* 보고서 섹션: 수정모드에서만 보임 */
  .rpt-box { display: none; }
  .mr-box  { display: none; }
  body.edit-mode .rpt-box { display: block; }
  body.edit-mode .mr-box  { display: block; }

  /* REPORT BOX */
  .rpt-box {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(28,50,84,.08);
  }
  .rpt-title {
    font-size: 13px; font-weight: 700; color: var(--navy);
    margin-bottom: 12px; letter-spacing: .2px;
    display: flex; align-items: center; gap: 8px;
  }
  .rpt-title::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--navy);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .rpt-row {
    display: flex; align-items: flex-end; gap: 8px;
  }
  .rpt-field { flex: 1; }
  .rpt-label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--ink-s); margin-bottom: 4px; letter-spacing: .5px;
  }
  .rpt-inp {
    width: 100%; padding: 9px 10px; font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    border: 1.5px solid var(--border); border-radius: 8px;
    outline: none; background: var(--bg); color: var(--ink);
    box-sizing: border-box;
  }
  .rpt-inp:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px #e7ebf2; background: var(--white); }
  .rpt-sep {
    font-size: 14px; color: var(--ink-s);
    padding-bottom: 10px; flex-shrink: 0;
  }
  .rpt-btn {
    padding: 10px 16px; font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-weight: 700;
    color: #fff; background: var(--navy);
    border: none; border-radius: 8px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: background .15s;
  }
  .rpt-btn:active { background: var(--navy-mid); }
  .rpt-btn:disabled { background: #9AAFD4; cursor: not-allowed; }
  .rpt-status {
    margin-top: 10px; font-size: 12px; color: var(--ink-s);
    text-align: center;
  }
  .rpt-link {
    display: block; margin-top: 10px; padding: 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-weight: 600;
    color: var(--navy); text-align: center; text-decoration: none;
  }

  /* MONTHLY REPORT BOX */
  .mr-box {
    background: var(--white); border: 1.5px solid #B2DFDB;
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(13,148,136,.1);
  }
  .mr-title {
    font-size: 13px; font-weight: 700; color: #0d9488;
    margin-bottom: 12px; letter-spacing: .2px;
    display: flex; align-items: center; gap: 8px;
  }
  .mr-title::before {
    content: '';
    width: 4px; height: 16px;
    background: #0d9488;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .mr-row {
    display: flex; align-items: flex-end; gap: 8px;
  }
  .mr-field { flex: 1; }
  .mr-label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--ink-s); margin-bottom: 4px; letter-spacing: .5px;
  }
  .mr-inp {
    width: 100%; padding: 9px 10px; font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    border: 1.5px solid var(--border); border-radius: 8px;
    outline: none; background: var(--bg); color: var(--ink);
    box-sizing: border-box; text-align: center;
  }
  .mr-inp:focus { border-color: #0d9488; box-shadow: 0 0 0 3px #E1F5EE; background: var(--white); }
  .mr-sep {
    font-size: 13px; color: var(--ink-s);
    padding-bottom: 10px; flex-shrink: 0;
  }
  .mr-btn {
    padding: 10px 14px; font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; font-weight: 700;
    color: #fff; background: #0d9488;
    border: none; border-radius: 8px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: background .15s;
  }
  .mr-btn:active  { background: #085041; }
  .mr-btn:disabled { background: #9FE1CB; cursor: not-allowed; }
  .mr-status {
    margin-top: 10px; font-size: 12px; color: var(--ink-s);
    text-align: center; line-height: 1.6;
  }

  /* PUBLIC CALENDAR (제출 폼 하단) */
  .pub-cal-wrap {
    max-width: 480px; margin: 20px auto 0; padding: 0 16px 60px;
  }
  .pub-cal-header {
    font-size: 13px; font-weight: 700; color: var(--ink-s);
    letter-spacing: .5px; text-transform: uppercase;
    margin-bottom: 10px; text-align: center;
  }
  .pub-cal-card {
    background: var(--white); border-radius: 14px; padding: 14px;
    box-shadow: 0 1px 4px rgba(28,50,84,.08);
    border: 1px solid var(--border);
  }

  /* CALENDAR */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-nav-btn {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; width: 34px; height: 34px;
    font-size: 18px; color: var(--navy); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-title { font-size: 15px; font-weight: 700; color: var(--navy); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 16px;
  }
  .cal-dow {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--ink-s); padding: 4px 0;
  }
  .cal-dow:first-child { color: #C0392B; }
  .cal-dow:last-child  { color: #2E6B8A; }
  .cal-day {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 4px 6px; min-height: 56px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; transition: background .15s, border-color .15s;
  }
  .cal-day:hover   { background: var(--bg); border-color: var(--navy-mid); }
  .cal-day.selected { background: var(--navy); border-color: var(--navy); }
  .cal-day.empty   { background: transparent; border-color: transparent; cursor: default; }
  .cal-dn { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 3px; }
  .cal-day.selected .cal-dn { color: #fff; }
  .cal-day-sun .cal-dn { color: #C0392B; }
  .cal-day-sat .cal-dn { color: #2E6B8A; }
  .cal-day.today .cal-dn { font-weight: 800; text-decoration: underline; }
  .cal-badge { font-size: 9px; color: var(--ink-s); text-align: center; line-height: 1.5; }
  .cal-day.selected .cal-badge { color: rgba(255,255,255,.75); }
  .cal-cnt-tag {
    background: var(--navy); color: #FAEEDA;

const SHEET_ID   = "1VNkF5t-MJWc5abCvFXdA-JlT0YEf-Y00cN1kPkF3lLI";
const ADMIN_PW   = "4Federalst!";

// ── 날짜 문자열 파싱 (로컬 기준, UTC 오프셋 문제 방지) ──
// "YYYY-MM-DD" → new Date()는 UTC 기준 파싱 → 보스턴(UTC-5)에서 전날로 밀림
// parseDateStr()은 로컬 자정으로 파싱하여 요일/날짜 오류 방지
function parseDateStr(str) {
  if (!str) return new Date(NaN);
  const p = str.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
}

// ── 보스턴 날짜 자동설정 ──
(function setBostonDate() {
  const now = new Date();
  const bos = new Intl.DateTimeFormat("ko-KR", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit"
  }).formatToParts(now);
  const p = {};
  bos.forEach(x => p[x.type] = x.value);
  document.getElementById("reportDate").value = p.year + "년 " + p.month + "월 " + p.day + "일";
  
  // 예배날짜 기본값도 오늘
  const y = p.year, m = p.month, d = p.day;
  document.getElementById("worshipDate").value = y + "-" + m + "-" + d;
})();

// ── 인원수 필드 동적 변경 ──
const SERVICE_2 = ["새벽예배"];
const SERVICE_3 = ["예꿈", "꿈땅", "중등부", "고등부"];
const SERVICE_4 = ["금요여성예배"]; // 현장 + 줌

function sanitizeNatural(el) {
  // 자연수(0 포함)만 허용 — 소수점, 음수, 문자 제거
  let v = el.value.replace(/[^0-9]/g, "");
  if (v.length > 1) v = v.replace(/^0+/, "") || "0";
  el.value = v;
}

function updateCountFields() {
  const svc = document.getElementById("serviceType").value;
  const wrap = document.getElementById("countWrap");
  const inp  = `type="number" min="0" step="1" pattern="[0-9]*" inputmode="numeric" placeholder="0"`;

  if (SERVICE_2.includes(svc)) {
    wrap.className = "cnt-grid g2-total";
    wrap.innerHTML = `
      <div class="cnt-item"><label>현장</label><input class="cnt-inp sub-inp" id="cnt_onsite"  ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item"><label>온라인</label><input class="cnt-inp sub-inp" id="cnt_online" ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item cnt-total-row"><label>합계</label><input class="cnt-inp cnt-total-disp" id="cnt_total" type="text" readonly placeholder="0"></div>`;
  } else if (SERVICE_4.includes(svc)) {
    wrap.className = "cnt-grid g2-total";

async function submitForm() {
  const reportDate  = document.getElementById("reportDate").value;
  const worshipDate = document.getElementById("worshipDate").value;
  const service     = document.getElementById("serviceType").value;
  const sig         = document.getElementById("signature").value.trim();
  const svc         = service;

  if (!worshipDate) return showToast("예배 날짜를 선택해주세요", "err");
  if (!service)     return showToast("예배를 선택해주세요", "err");
  if (!sig)         return showToast("서명을 입력해주세요", "err");

  // collect counts
  let total=0, onsite=0, online=0, student=0, teacher=0, other=0;
  if (SERVICE_2.includes(svc) || SERVICE_4.includes(svc)) {
    onsite  = parseInt(document.getElementById("cnt_onsite")?.value  || 0) || 0;
    online  = parseInt(document.getElementById("cnt_online")?.value  || 0) || 0;
    total   = onsite + online;
  } else if (SERVICE_3.includes(svc)) {
    student = parseInt(document.getElementById("cnt_student")?.value || 0) || 0;
    teacher = parseInt(document.getElementById("cnt_teacher")?.value || 0) || 0;
    other   = parseInt(document.getElementById("cnt_other")?.value   || 0) || 0;
    total   = student + teacher + other;
  } else {
    total   = parseInt(document.getElementById("cnt_total")?.value   || 0) || 0;
  }

  const payload = {
    action: "submit", reportDate, worshipDate, service,
    total, onsite, online, student, teacher, other, signature: sig
  };

  // ── 중복 제출 체크 (3초 타임아웃) ──
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=출석보고`;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);
    const res  = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    const text = await res.text();
    const rows = parseCSV(text).slice(1);
    const dup  = rows.find(r => {
      const d = (r[2] || "").replace(/"/g,"").trim();
      const s = (r[3] || "").replace(/"/g,"").trim();
      return d === worshipDate && s === service;
    });
    if (dup) {
      const [y,m,d] = worshipDate.split("-");
      const fmtDate = `${y}. ${m}. ${d}`;
      const msg = `이미 제출된 ${fmtDate}, ${service} 예배에 인원수가 존재합니다. 수정하시겠습니까?`;
      showDupModal(msg, (dupName, dupReason) => doSubmit(payload, sig, worshipDate, service, total, dupName, dupReason));
      return;
    }
  } catch(e) {
    // 타임아웃 또는 오류 시 중복 체크 건너뛰고 바로 제출
  }

  doSubmit(payload, sig, worshipDate, service, total);
}

function doSubmit(payload, sig, worshipDate, service, total, dupName, dupReason) {
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "제출 중...";

  const params = new URLSearchParams({
    action:      payload.action,
    reportDate:  payload.reportDate  || "",
    worshipDate: payload.worshipDate || "",
    service:     payload.service     || "",
    total:       payload.total       || 0,
    onsite:      payload.onsite      || 0,
    online:      payload.online      || 0,
    student:     payload.student     || 0,
    teacher:     payload.teacher     || 0,
    other:       payload.other       || 0,
    signature:   payload.signature   || "",
    modifier:    dupName   || "",
    reason:      dupReason || ""
  });
  const url = SCRIPT_URL + "?" + params.toString();

  const img = new Image();
  img.onload = img.onerror = function() {
    btn.disabled = false;
    btn.textContent = "제출하기";
    showSuccess(payload.reportDate, worshipDate, service, total, sig);
  };
  img.src = url;

  // 5초 후에도 응답 없으면 성공으로 처리 (Apps Script 특성상 오래 걸릴 수 있음)
  setTimeout(function() {
    if (btn.disabled) {
      btn.disabled = false;
      btn.textContent = "제출하기";
      showSuccess(payload.reportDate, worshipDate, service, total, sig);
    }
  }, 5000);
}

// ── 수정모드 ──
// 코드에는 SHA-256 해시만 저장 (원본 비밀번호 비공개)
const EDIT_PW_HASH = "6f9288184c62c08b3f99e92488ec70c3e0c7343522d083aeb113ff0e8e900b3f";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// 트리플클릭 구현 (800ms 이내 3번)
let _secretClickTime = 0;
let _secretClickCount = 0;
function handleSecretClick() {
  const now = Date.now();
  if (now - _secretClickTime > 800) {
    _secretClickCount = 1;
  } else {
    _secretClickCount++;
  }
  _secretClickTime = now;
  if (_secretClickCount >= 3) {
    _secretClickCount = 0;
    _secretClickTime  = 0;
    promptEditMode();
  }
}

function promptEditMode() {
  const isActive = document.body.classList.contains("edit-mode");
  if (isActive) {
    document.body.classList.remove("edit-mode");
    document.getElementById("secretEditBtn").classList.remove("active");
    return;
  }
  document.getElementById("editModePwInput").value = "";
  document.getElementById("editModeOverlay").classList.add("open");
  setTimeout(() => document.getElementById("editModePwInput").focus(), 100);
}

async function checkEditModePw() {
  const input = document.getElementById("editModePwInput").value;
  const hash  = await sha256(input);
  if (hash === EDIT_PW_HASH) {
    document.getElementById("editModeOverlay").classList.remove("open");
    document.getElementById("editModePwInput").value = "";
    document.body.classList.add("edit-mode");
    document.getElementById("secretEditBtn").classList.add("active");
  } else {
    showToast("비밀번호가 틀렸습니다", "err");
    document.getElementById("editModePwInput").value = "";
  }
}

const ALL_SERVICES = ["주일 1부 예배","주일 2부 예배","새벽예배","수요예배","예꿈","꿈땅","중등부","고등부","이음","위윈","위윈EM","금요여성예배"];
const SVC2 = ["새벽예배"];
const SVC3 = ["예꿈","꿈땅","중등부","고등부"];
const SVC4 = ["금요여성예배"];
let _calYear, _calMonth, _allRows = [], _selectedDate = null;
const DAYS_KO = ["일","월","화","수","목","금","토"];

// ── 공개 달력 전역 상태 ──
let _pubYear, _pubMonth, _pubRows = [], _pubSelectedDate = null;

async function loadPubCalendar(year, month) {
  _pubYear  = year;

function pubChangeMonth(delta) {
  let y = _pubYear, m = _pubMonth + delta;
  if (m > 11) { y++; m = 0; }
  if (m < 0)  { y--; m = 11; }
  _pubSelectedDate = null;
  loadPubCalendar(y, m);
}

function renderPubCalendar(year, month) {
  const dayMap = {};
  _pubRows.forEach(row => {
    const d = (row[2] || "").replace(/"/g,"").trim();
    if (!d) return;
    const dt = parseDateStr(d);
    if (dt.getFullYear() === year && dt.getMonth() === month) {
      if (!dayMap[d]) dayMap[d] = { count: 0, total: 0 };
      dayMap[d].count++;
      dayMap[d].total += parseInt(row[4]) || 0;
    }
  });

  const today = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  let html = "";
  ["일","월","화","수","목","금","토"].forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDate; d++) {
    const dk    = year + "-" + String(month+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const dow   = (firstDay + d - 1) % 7;
    const info  = dayMap[dk];
    const isToday    = dk === today;
    const isSelected = dk === _pubSelectedDate;
    let cls = "cal-day";
    if (dow === 0) cls += " cal-day-sun";
    if (dow === 6) cls += " cal-day-sat";
    if (isToday)    cls += " today";
    if (isSelected) cls += " selected";
    let badge = "";
    if (info) {
      badge = `<div class="cal-cnt-tag">${info.count}건</div><div class="cal-badge">${info.total}명</div>`;
    }
    html += `<div class="${cls}" onclick="pubSelectDate('${dk}')">
      <div class="cal-dn">${d}</div>${badge}
    </div>`;
  }
  document.getElementById("pubCalGrid").innerHTML = html;
  if (_pubSelectedDate) renderPubDateSummary(_pubSelectedDate);
}

function pubSelectDate(dk) {
  _pubSelectedDate = dk;
  renderPubCalendar(_pubYear, _pubMonth);
}

function renderPubDateSummary(dk) {
  const map = {};
  _pubRows.forEach((r, i) => {
    const rd = (r[2]||"").replace(/"/g,"").trim();
    const rs = (r[3]||"").replace(/"/g,"").trim();
    if (rd === dk) map[rs] = { row: r };
  });

  const [Y,M,D] = dk.split("-");
  const dt = parseDateStr(dk);
  const dateLabel = `${Y}년 ${M}월 ${D}일 (${DAYS_KO[dt.getDay()]})`;

  let totalAll = 0;
  let rows_html = "";

  ALL_SERVICES.forEach(svc => {
    const entry = map[svc];
    if (!entry) {
      rows_html += `<div class="sum-row">
        <span class="sum-svc">${svc}</span>
        <span class="sum-missing">미제출</span>
      </div>`;
      return;
    }
    const row   = entry.row;
    const total = parseInt(row[4]) || 0;
    const onsite  = parseInt(row[5]) || 0;
    const online  = parseInt(row[6]) || 0;
    const student = parseInt(row[7]) || 0;
    const teacher = parseInt(row[8]) || 0;
    const other   = parseInt(row[9]) || 0;
    totalAll += total;

    let detail = "";
    if (SVC2.includes(svc)||SVC4.includes(svc)) detail = `현장 ${onsite}  온라인 ${online}`;
    else if (SVC3.includes(svc)) detail = `학생 ${student}  교역자+교사 ${teacher}  그외 ${other}`;

    rows_html += `<div class="sum-row">
      <div class="sum-svc">${svc}</div>
      <div>
        ${detail ? `<div class="sum-detail">${detail}</div>` : ""}
        <div class="sum-cnt">${total}명</div>
      </div>
    </div>`;
  });

  document.getElementById("pubDateSummary").innerHTML = `
    <div class="sum-card" style="margin-top:12px;">
      <div class="sum-card-hdr">📅 ${dateLabel} 예배 출석 현황</div>
      ${rows_html}
      <div class="sum-total-row">
        <span class="sum-svc">전체 합계</span>
        <span class="sum-cnt">${totalAll}명</span>
      </div>
    </div>`;

  setTimeout(() => document.getElementById("pubDateSummary").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
}

  _selectedDate = dk;
  renderCalendar(_calYear, _calMonth);
}

// ── 날짜별 출석 현황 표 ──
function renderDateSummary(dk) {
  const data = _allRows.filter(r => (r[2]||"").replace(/"/g,"").trim() === dk);
  const map  = {};
  // rowIndex는 시트에서의 실제 행 번호(1-based, 헤더 포함) → _allRows index + 2
  _allRows.forEach((r, i) => {
    const rd = (r[2]||"").replace(/"/g,"").trim();
    const rs = (r[3]||"").replace(/"/g,"").trim();
    if (rd === dk) map[rs] = { row: r, sheetRow: i + 2 };
  });

  const [Y,M,D] = dk.split("-");
  const dt  = parseDateStr(dk);
  const dateLabel = `${Y}년 ${M}월 ${D}일 (${DAYS_KO[dt.getDay()]})`;

  let totalAll = 0;
  let rows_html = "";

  ALL_SERVICES.forEach(svc => {
    const entry = map[svc];
    if (!entry) {
      rows_html += `<div class="sum-row">
        <span class="sum-svc">${svc}</span>
        <span class="sum-missing">미제출</span>
      </div>`;
      return;
    }
    const row      = entry.row;
    const sheetRow = entry.sheetRow;
    const total    = parseInt(row[4]) || 0;
    const onsite   = parseInt(row[5]) || 0;
    const online   = parseInt(row[6]) || 0;
    const student  = parseInt(row[7]) || 0;
    const teacher  = parseInt(row[8]) || 0;
    const other    = parseInt(row[9]) || 0;
    const sig      = (row[10]||"").replace(/"/g,"").trim();
    totalAll += total;

    let detail = "";
    if (SVC2.includes(svc)||SVC4.includes(svc)) detail = `현장 ${onsite}  온라인 ${online}`;
    else if (SVC3.includes(svc)) detail = `학생 ${student}  교역자+교사 ${teacher}  그외 ${other}`;

    // 수정/삭제 버튼에 필요한 데이터를 JSON으로 인코딩
    const rowData = encodeURIComponent(JSON.stringify({
      sheetRow, svc, dk, total, onsite, online, student, teacher, other, sig
    }));

    rows_html += `<div class="sum-row">
      <div class="sum-svc">${svc}<br><span class="sum-sig">✍️ ${sig}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div>
          ${detail ? `<div class="sum-detail">${detail}</div>` : ""}
          <div class="sum-cnt">${total}명</div>
        </div>
        <div class="sum-acts">
          <button class="btn-edit" onclick="openEditModal('${rowData}')">수정</button>
          <button class="btn-del-sm" onclick="openDelModal('${rowData}')">삭제</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById("dateSummary").innerHTML = `
    <div class="sum-card">
      <div class="sum-card-hdr">📅 ${dateLabel} 예배 출석 현황</div>
      ${rows_html}
      <div class="sum-total-row">
        <span class="sum-svc">전체 합계</span>
        <span class="sum-cnt">${totalAll}명</span>
      </div>
    </div>`;

  // 스크롤
  setTimeout(() => document.getElementById("dateSummary").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
}

// ── 수정 모달 ──
function openEditModal(encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  const svc = d.svc;

  document.getElementById("editTitle").textContent = "✏️ " + svc + " 수정";

  const inp = (id, label, val) => `
    <div class="edit-item">
      <label>${label}</label>
      <input class="edit-inp" id="ei_${id}" type="number" min="0" step="1"
        inputmode="numeric" value="${val}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');editCalcTotal()">
    </div>`;

  let fields = "", cols = "g1";
  if (SVC2.includes(svc)||SVC4.includes(svc)) {
    cols = "g2";
    fields = inp("onsite","현장",d.onsite) + inp("online","온라인",d.online);
  } else if (SVC3.includes(svc)) {
    cols = "g3";
    fields = inp("student","학생",d.student) + inp("teacher","교역자+교사",d.teacher) + inp("other","그외",d.other);
  } else {
    fields = inp("total","총 인원",d.total);
  }

  const hasBreakdown = (SVC2.includes(svc)||SVC4.includes(svc)||SVC3.includes(svc));
  const totalRow = hasBreakdown ? `
    <div class="edit-item" style="grid-column:1/-1;border-top:1.5px dashed var(--border);padding-top:10px;margin-top:4px;">
      <label>합계</label>
      <input class="edit-inp" id="ei_sum" type="text" readonly
        style="background:var(--navy);color:#fff;border-color:var(--navy);">
    </div>` : "";

  document.getElementById("editFields").innerHTML = `
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--ink-s);margin-bottom:5px;letter-spacing:.5px;">예배 날짜</label>
      <input type="date" id="ei_date" value="${d.dk}"
        style="width:100%;padding:11px 12px;font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
               border:1.5px solid var(--border);border-radius:9px;outline:none;
               background:var(--bg);color:var(--ink);box-sizing:border-box;">
    </div>
    <div class="edit-row ${cols}">${fields}${totalRow}</div>`;

  editCalcTotal();

  document.getElementById("editOverlay").classList.add("open");
  document.getElementById("editConfirmBtn").onclick = function() {
    doEditSubmit(d);
  };
  document.getElementById("editCancelBtn").onclick = function() {
    document.getElementById("editOverlay").classList.remove("open");
  };
}

function editCalcTotal() {
  const ids = ["ei_onsite","ei_online","ei_student","ei_teacher","ei_other"];
  let sum = 0;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) sum += parseInt(el.value||0)||0;
  });
  const sumEl = document.getElementById("ei_sum");
  if (sumEl) sumEl.value = sum + "명";
}

function doEditSubmit(d) {
  const svc     = d.svc;
  const name    = document.getElementById("editName").value.trim();
  const reason  = document.getElementById("editReason").value.trim();
  if (!name)   return showToast("수정한 사람 이름을 입력해주세요", "err");
  if (!reason) return showToast("수정 사유를 입력해주세요", "err");
  const newDate = document.getElementById("ei_date")?.value || d.dk;
  let total=0, onsite=0, online=0, student=0, teacher=0, other=0;
  if (SVC2.includes(svc)||SVC4.includes(svc)) {
    onsite  = parseInt(document.getElementById("ei_onsite")?.value||0)||0;
    online  = parseInt(document.getElementById("ei_online")?.value||0)||0;
    total   = onsite + online;
  } else if (SVC3.includes(svc)) {
    student = parseInt(document.getElementById("ei_student")?.value||0)||0;
    teacher = parseInt(document.getElementById("ei_teacher")?.value||0)||0;
    other   = parseInt(document.getElementById("ei_other")?.value||0)||0;
    total   = student + teacher + other;
  } else {
    total = parseInt(document.getElementById("ei_total")?.value||0)||0;
  }

  document.getElementById("editOverlay").classList.remove("open");
  showToast("수정 중...", "");

  const params = new URLSearchParams({
    action:      "submit",
    reportDate:  newDate,
    worshipDate: newDate,
    service:     svc,
    total, onsite, online, student, teacher, other,
    signature:   d.sig,
    modifier:    name,
    reason:      reason,
    editType:    "수정"
  });
  const img = new Image();
  img.onload = img.onerror = function() {
    showToast("수정 완료!", "ok");
    setTimeout(() => loadCalendar(_calYear, _calMonth), 2500);
  };
  img.src = SCRIPT_URL + "?" + params.toString();
  setTimeout(function() {
    showToast("수정 완료!", "ok");
    setTimeout(() => loadCalendar(_calYear, _calMonth), 2500);
  }, 5000);
}

// ── 삭제 모달 ──
function openDelModal(encoded) {
  const d   = JSON.parse(decodeURIComponent(encoded));
  const dt  = parseDateStr(d.dk);
  const msg = `${dt.getMonth()+1}월 ${dt.getDate()}일 ${DAYS_KO[dt.getDay()]}요일 ${d.svc} 를 삭제하시겠습니까?`;
  document.getElementById("delMsg").textContent = msg;
  document.getElementById("delName").value   = "";
  document.getElementById("delReason").value = "";
  document.getElementById("delOverlay").classList.add("open");
  document.getElementById("delConfirmBtn").onclick = function() {
    const name   = document.getElementById("delName").value.trim();
    const reason = document.getElementById("delReason").value.trim();
    if (!name)   return showToast("삭제한 사람 이름을 입력해주세요", "err");
    if (!reason) return showToast("삭제 사유를 입력해주세요", "err");
    document.getElementById("delOverlay").classList.remove("open");
    doDeleteRow(d.sheetRow, d, reason, name);
  };
  document.getElementById("delCancelBtn").onclick = function() {
    document.getElementById("delOverlay").classList.remove("open");
  };
}

let _busy = false;
function doDeleteRow(sheetRow, rowData, reason, modifier) {
  if (_busy) return;
  _busy = true;
  showToast("삭제 중...", "");
  const params = new URLSearchParams({
    action:   "delete",
    pw:       ADMIN_PW,
    rowIndex: sheetRow,
    reason:   reason   || "",
    modifier: modifier || "",
    dk:       rowData ? rowData.dk      : "",
    svc:      rowData ? rowData.svc     : "",
    total:    rowData ? rowData.total   : 0,
    onsite:   rowData ? rowData.onsite  : 0,
    online:   rowData ? rowData.online  : 0,
    student:  rowData ? rowData.student : 0,
    teacher:  rowData ? rowData.teacher : 0,
    other:    rowData ? rowData.other   : 0,
    sig:      rowData ? rowData.sig     : ""
  });
  const img = new Image();
  img.onload = img.onerror = function() {
    _busy = false;
    showToast("삭제 완료!", "ok");
    setTimeout(() => loadCalendar(_calYear, _calMonth), 2500);
  };
  img.src = SCRIPT_URL + "?" + params.toString();l;
  setTimeout(function() {
    if (_busy) {
      _busy = false;
      showToast("삭제 완료!", "ok");
      setTimeout(() => loadCalendar(_calYear, _calMonth), 2500);
    }
  }, 5000);
}

// ── ADMIN ──
function openAdmin() {
  document.getElementById("pwOverlay").classList.add("open");
  setTimeout(() => document.getElementById("pwInput").focus(), 100);
}
function checkPw() {
  if (document.getElementById("pwInput").value === ADMIN_PW) {
    document.getElementById("pwOverlay").classList.remove("open");
    document.getElementById("pwInput").value = "";
    document.getElementById("formView").style.display  = "none";
    document.getElementById("successView").style.display = "none";
    document.getElementById("adminView").style.display = "block";
    document.getElementById("pubCalView").style.display = "none";
    document.body.classList.add("admin-mode");

    // 오늘 날짜(보스턴) 기준으로 달력 열기
    // new Date("YYYY-MM-DD") 은 UTC 자정 → 보스턴(UTC-5)에서 getDate()가 전날 반환
    // → 날짜 부분을 직접 분리해 new Date(y, m, d) 로컬 생성
    const bosStr = new Intl.DateTimeFormat("en-CA", {timeZone: "America/New_York"}).format(new Date());
    const [_by, _bm, _bd] = bosStr.split("-").map(Number);
    const bosNow = new Date(_by, _bm - 1, _bd); // 보스턴 로컬 자정
    loadCalendar(bosNow.getFullYear(), bosNow.getMonth());

    // 보고서 기본 기간: 최근 2주 (보스턴 날짜 기준 포맷)
    const fmtDate = d => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };
    const twoWeeksAgo = new Date(bosNow.getFullYear(), bosNow.getMonth(), bosNow.getDate() - 13);
    document.getElementById("rptStart").value = fmtDate(twoWeeksAgo);
    document.getElementById("rptEnd").value   = fmtDate(bosNow);

    // 월간보고 기본값: 이전 달 (당월 보고서는 다음 달 초에 작성하는 경우 대비)
    const prevMonth = new Date(bosNow.getFullYear(), bosNow.getMonth(), 1);
    prevMonth.setMonth(prevMonth.getMonth() - 1);
    document.getElementById("mrYear").value  = prevMonth.getFullYear();
    document.getElementById("mrMonth").value = prevMonth.getMonth() + 1;
  } else {
    showToast("비밀번호가 틀렸습니다", "err");
  }
}
function logoutAdmin() {
  document.getElementById("adminView").style.display = "none";
  document.getElementById("formView").style.display  = "block";
  document.getElementById("pubCalView").style.display = "block";
  document.body.classList.remove("edit-mode");
  document.body.classList.remove("admin-mode");
}

async function loadAdminData() {
  const cards = document.getElementById("adminCards");
  cards.innerHTML = "<div style='text-align:center;padding:30px;color:var(--ink-s);font-size:14px;'>불러오는 중...</div>";
  try {
    const url = `https://docs.google.com/spreadsheets/d/\${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=출석보고`;
    const res = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length <= 1) {
      cards.innerHTML = "<div class=\"adm-empty\">데이터가 없습니다.</div>"; return;
    }
    cards.innerHTML = "";
    // rows[0] = header, rows[1..] = data (newest first)
    const data = rows.slice(1).reverse();
    data.forEach((row, i) => {
      const realIdx = rows.length - 1 - i; // 1-based row in sheet
      const ts      = row[0] || "";
      const repDate = row[1] || "";
      const wDate   = row[2] || "";
      const svc     = row[3] || "";
      const total   = row[4] || "";
      const onsite  = row[5] || "";
      const online  = row[6] || "";
      const student = row[7] || "";
      const teacher = row[8] || "";
      const other   = row[9] || "";
      const sig     = row[10] || "";

      // build badges
      let badges = "";
      if (onsite || online) {
        if (onsite)  badges += `<span class="badge">현장 \${onsite}명</span>`;
        if (online)  badges += `<span class="badge">온라인 \${online}명</span>`;
      } else if (student || teacher || other) {
        if (student) badges += `<span class="badge">학생 \${student}명</span>`;
        if (teacher) badges += `<span class="badge">교역자+교사 \${teacher}명</span>`;
        if (other)   badges += `<span class="badge">그외 \${other}명</span>`;
      } else {
        badges += `<span class="badge">총 \${total}명</span>`;
      }

      const card = document.createElement("div");
      card.className = "adm-card";
      card.innerHTML = `
        <div class="adm-card-top">
          <div>
            <div class="adm-svc">\${svc}</div>
            <div class="adm-date">예배일 \${wDate} · 보고일 \${repDate}</div>
          </div>
        </div>
        <div class="adm-badges">\${badges}</div>
        <div class="adm-sig">✍️ \${sig}</div>
        <div class="adm-acts">
          <button class="btn-del" onclick="deleteRow(\${realIdx}, this)">삭제</button>
        </div>`;
      cards.appendChild(card);
    });
  } catch(e) {
    cards.innerHTML = "<div class=\"adm-empty\">불러오기 실패</div>";
  }
}



// ── CSV PARSER ──
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = "", inQ = false;
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      if (ch === '"' && !inQ) { inQ = true; }
      else if (ch === '"' && inQ) {
        if (line[ci+1] === '"') { cur += '"'; ci++; }
        else inQ = false;
      } else if (ch === "," && !inQ) { cols.push(cur); cur = ""; }
      else cur += ch;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}
