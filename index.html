<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>예배 출석 보고</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
  :root {
    --navy:      #1A3070;
    --navy-mid:  #2B4A8A;
    --pale:      #EEF2F9;
    --border:    #C2CFE8;
    --ink:       #1A2440;
    --ink-s:     #556789;
    --bg:        #F4F7FC;
    --white:     #FFFFFF;
    --red:       #C0392B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Pretendard", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  .hdr {
    background: var(--navy);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(26,48,112,.2);
  }
  .hdr img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
  .hdr-t h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .hdr-t p  { font-size: 10px; color: rgba(255,255,255,.55); margin-top: 1px; letter-spacing: .5px; }

  /* WRAP */
  .wrap { max-width: 460px; margin: 0 auto; padding: 20px 16px 60px; }

  /* STEP CARD */
  .step {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 10px;
    box-shadow: 0 1px 5px rgba(26,48,112,.07);
    position: relative;
  }
  .step-num {
    position: absolute; top: 18px; right: 18px;
    font-size: 11px; font-weight: 700;
    color: var(--border);
    letter-spacing: .5px;
  }
  .step-label {
    font-size: 10.5px; font-weight: 700;
    color: var(--ink-s);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* INPUTS */
  .inp, .sel {
    width: 100%;
    padding: 13px 14px;
    font-size: 16px;
    font-family: "Pretendard", sans-serif;
    color: var(--ink);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    appearance: none; -webkit-appearance: none;
  }
  .inp:focus, .sel:focus {
    border-color: var(--navy-mid);
    box-shadow: 0 0 0 3px rgba(43,74,138,.12);
    background: var(--white);
  }
  .inp[readonly] { color: var(--ink-s); background: var(--pale); cursor: default; }
  .sel-wrap { position: relative; }
  .sel-wrap::after {
    content: "▾"; position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--ink-s);
    pointer-events: none; font-size: 14px;
  }

  /* COUNT GRID */
  .cnt-grid { display: grid; gap: 10px; }
  .cnt-grid.g1 { grid-template-columns: 1fr; }
  .cnt-grid.g2 { grid-template-columns: 1fr 1fr; }
  .cnt-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .cnt-item label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--ink-s); margin-bottom: 5px;
    text-align: center; letter-spacing: .3px;
  }
  .cnt-inp {
    width: 100%;
    padding: 12px 6px;
    font-size: 22px; font-weight: 700;
    font-family: "Pretendard", sans-serif;
    color: var(--navy);
    background: var(--pale);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    outline: none;
    text-align: center;
    transition: border-color .15s, box-shadow .15s;
  }
  .cnt-inp:focus {
    border-color: var(--navy-mid);
    box-shadow: 0 0 0 3px rgba(43,74,138,.12);
    background: var(--white);
  }

  /* SIGNATURE */
  .sig-box {
    border: 1.5px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .sig-inp {
    width: 100%; padding: 14px;
    font-size: 20px; font-weight: 600;
    font-family: "Pretendard", sans-serif;
    color: var(--navy);
    background: var(--bg);
    border: none; outline: none;
    text-align: center; letter-spacing: 3px;
  }
  .sig-inp:focus { background: var(--white); }
  .sig-line {
    border-top: 1px solid var(--border);
    padding: 6px 14px; font-size: 10px;
    color: var(--ink-s); text-align: center;
    letter-spacing: .4px;
  }

  .cnt-grid.g2-total { grid-template-columns: 1fr 1fr; }
  .cnt-grid.g3-total { grid-template-columns: 1fr 1fr 1fr; }
  .cnt-total-row {
    grid-column: 1 / -1;
    border-top: 1.5px dashed var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }
  .cnt-total-disp {
    background: var(--navy) !important;
    color: #fff !important;
    border-color: var(--navy) !important;
    font-size: 24px !important;
    letter-spacing: 1px;
    cursor: default;
  }
  .cnt-total-disp:focus {
    box-shadow: none !important;
  }

  /* SUBMIT */
  .btn-sub {
    width: 100%; padding: 17px;
    font-size: 16px; font-family: "Pretendard", sans-serif;
    font-weight: 700; color: #fff;
    background: var(--navy); border: none;
    border-radius: 14px; cursor: pointer;
    letter-spacing: .8px;
    transition: background .15s, transform .1s;
    box-shadow: 0 4px 18px rgba(26,48,112,.25);
    margin-top: 4px;
  }
  .btn-sub:active { transform: scale(.98); background: var(--navy-mid); }
  .btn-sub:disabled { background: #9AAFD4; cursor: not-allowed; transform: none; }

  /* SUCCESS */
  .success { display: none; text-align: center; padding: 50px 20px; }
  .success-icon { font-size: 60px; margin-bottom: 16px; }
  .success h2 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .success p  { font-size: 14px; color: var(--ink-s); line-height: 1.7; margin-bottom: 28px; }
  .btn-again {
    display: inline-block; padding: 13px 30px;
    font-size: 14px; font-family: "Pretendard", sans-serif;
    font-weight: 600; color: var(--navy);
    background: var(--pale); border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: #fff;
    padding: 12px 22px; border-radius: 40px;
    font-size: 13px; font-weight: 600;
    white-space: nowrap;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }
  .toast.show  { transform: translateX(-50%) translateY(0); }
  .toast.ok    { background: #2E6B3E; }
  .toast.err   { background: var(--red); }

  /* ADMIN FAB */
  .fab {
    position: fixed; bottom: 24px; right: 18px;
    width: 42px; height: 42px;
    background: rgba(26,48,112,.12);
    border: none; border-radius: 50%;
    font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50; transition: background .2s;
  }
  .fab:hover { background: rgba(26,48,112,.22); }

  /* ADMIN MODAL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,20,50,.5);
    backdrop-filter: blur(4px); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--white); border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px; width: 100%;
    max-width: 460px; max-height: 90vh; overflow-y: auto;
  }
  .handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .sheet h3 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
  .modal-inp {
    width: 100%; padding: 13px 14px;
    font-size: 15px; font-family: "Pretendard", sans-serif;
    border: 1.5px solid var(--border); border-radius: 10px;
    outline: none; margin-bottom: 12px; background: var(--bg);
  }
  .modal-inp:focus { border-color: var(--navy-mid); background: var(--white); }
  .btn-conf {
    width: 100%; padding: 14px;
    font-size: 15px; font-family: "Pretendard", sans-serif;
    font-weight: 700; color: #fff;
    background: var(--navy); border: none;
    border-radius: 10px; cursor: pointer;
  }

  /* TABS */
  .adm-tabs {
    display: flex; background: var(--pale);
    border-bottom: 1.5px solid var(--border);
  }
  .adm-tab {
    flex: 1; padding: 13px 6px;
    font-size: 13px; font-family: "Pretendard", sans-serif;
    font-weight: 600; color: var(--ink-s);
    background: none; border: none; cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
    letter-spacing: -.2px;
  }
  .adm-tab.active { color: var(--navy); border-bottom-color: var(--navy); }

  /* DATE PICKER */
  .date-pick-wrap { margin-bottom: 16px; }
  .pick-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--ink-s); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 7px;
  }
  .pick-inp { font-size: 16px !important; background: var(--white) !important; }

  /* SUMMARY TABLE */
  .sum-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 5px rgba(26,48,112,.07);
    margin-bottom: 14px;
  }
  .sum-card-hdr {
    background: var(--navy); color: #fff;
    padding: 12px 16px; font-size: 13px; font-weight: 700;
    letter-spacing: .3px;
  }
  .sum-row {
    display: flex; align-items: center;
    padding: 13px 16px; border-bottom: 1px solid var(--pale);
    gap: 10px;
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-svc {
    flex: 1; font-size: 14px; font-weight: 600; color: var(--ink);
  }
  .sum-cnt {
    font-size: 18px; font-weight: 800; color: var(--navy);
    min-width: 48px; text-align: right;
  }
  .sum-detail {
    font-size: 11px; color: var(--ink-s);
    text-align: right; line-height: 1.6;
  }
  .sum-missing {
    font-size: 13px; font-weight: 600;
    color: #B0B8CC; font-style: italic;
  }
  .sum-sig {
    font-size: 11px; color: var(--ink-s); margin-left: 2px;
  }
  .sum-total-row {
    background: var(--pale);
    display: flex; align-items: center;
    padding: 14px 16px; gap: 10px;
  }
  .sum-total-row .sum-svc {
    font-size: 13px; font-weight: 700; color: var(--navy);
  }
  .sum-total-row .sum-cnt {
    font-size: 20px; color: var(--navy);
  }

  /* ADMIN BODY */
  .adm-hdr {
    background: var(--navy); color: #fff;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .adm-hdr h2 { font-size: 15px; font-weight: 700; }
  .btn-out {
    font-size: 12px; font-family: "Pretendard", sans-serif;
    color: rgba(255,255,255,.8);
    background: rgba(255,255,255,.12);
    border: none; padding: 6px 12px;
    border-radius: 6px; cursor: pointer;
  }
  /* REPORT BOX */
  .rpt-box {
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 1px 5px rgba(26,48,112,.07);
  }
  .rpt-title {
    font-size: 13px; font-weight: 700; color: var(--navy);
    margin-bottom: 12px; letter-spacing: .3px;
  }
  .rpt-row {
    display: flex; align-items: flex-end; gap: 8px;
  }
  .rpt-field { flex: 1; }
  .rpt-label {
    display: block; font-size: 10px; font-weight: 700;
    color: var(--ink-s); margin-bottom: 4px; letter-spacing: .5px;
  }
  .rpt-inp {
    width: 100%; padding: 9px 10px; font-size: 13px;
    font-family: "Pretendard", sans-serif;
    border: 1.5px solid var(--border); border-radius: 8px;
    outline: none; background: var(--pale); color: var(--ink);
    box-sizing: border-box;
  }
  .rpt-inp:focus { border-color: var(--navy-mid); background: var(--white); }
  .rpt-sep {
    font-size: 14px; color: var(--ink-s);
    padding-bottom: 10px; flex-shrink: 0;
  }
  .rpt-btn {
    padding: 10px 16px; font-size: 13px;
    font-family: "Pretendard", sans-serif; font-weight: 700;
    color: #fff; background: var(--navy);
    border: none; border-radius: 8px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: background .15s;
  }
  .rpt-btn:active { background: var(--navy-mid); }
  .rpt-btn:disabled { background: #9AAFD4; cursor: not-allowed; }
  .rpt-status {
    margin-top: 10px; font-size: 12px; color: var(--ink-s);
    text-align: center;
  }
  .rpt-link {
    display: block; margin-top: 10px; padding: 10px;
    background: var(--pale); border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-weight: 600;
    color: var(--navy); text-align: center; text-decoration: none;
  }

  /* CALENDAR */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-nav-btn {
    background: var(--pale); border: 1px solid var(--border);
    border-radius: 8px; width: 36px; height: 36px;
    font-size: 20px; color: var(--navy); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 16px;
  }
  .cal-dow {
    text-align: center; font-size: 10px; font-weight: 700;
    color: var(--ink-s); padding: 4px 0;
  }
  .cal-dow:first-child { color: #C0392B; }
  .cal-dow:last-child  { color: #2E6B8A; }
  .cal-day {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 4px 6px; min-height: 56px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; transition: background .15s, border-color .15s;
  }
  .cal-day:hover   { background: var(--pale); border-color: var(--navy-mid); }
  .cal-day.selected { background: var(--navy); border-color: var(--navy); }
  .cal-day.empty   { background: transparent; border-color: transparent; cursor: default; }
  .cal-dn { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 3px; }
  .cal-day.selected .cal-dn { color: #fff; }
  .cal-day-sun .cal-dn { color: #C0392B; }
  .cal-day-sat .cal-dn { color: #2E6B8A; }
  .cal-day.today .cal-dn { font-weight: 800; text-decoration: underline; }
  .cal-badge { font-size: 9px; color: var(--ink-s); text-align: center; line-height: 1.5; }
  .cal-day.selected .cal-badge { color: rgba(255,255,255,.75); }
  .cal-cnt-tag {
    background: var(--navy-mid); color: #fff;
    border-radius: 4px; padding: 1px 4px; font-size: 9px;
    font-weight: 700; margin-bottom: 1px; display: inline-block;
  }
  .cal-day.selected .cal-cnt-tag { background: rgba(255,255,255,.3); color: #fff; }
  /* SUM ROW ACTIONS */
  .sum-acts { display: flex; gap: 6px; }
  .btn-edit {
    padding: 5px 10px; font-size: 11px;
    font-family: "Pretendard", sans-serif; font-weight: 600;
    color: var(--navy); background: var(--pale);
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  }
  .btn-del-sm {
    padding: 5px 10px; font-size: 11px;
    font-family: "Pretendard", sans-serif; font-weight: 600;
    color: var(--red); background: #FEF2F2;
    border: 1px solid #FECACA; border-radius: 6px; cursor: pointer;
  }
  /* EDIT FIELDS */
  .edit-row { display: grid; gap: 10px; margin-bottom: 12px; }
  .edit-row.g1 { grid-template-columns: 1fr; }
  .edit-row.g2 { grid-template-columns: 1fr 1fr; }
  .edit-row.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .edit-item label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--ink-s); margin-bottom: 5px; text-align: center;
  }
  .edit-inp {
    width: 100%; padding: 12px 6px; font-size: 22px; font-weight: 700;
    font-family: "Pretendard", sans-serif; color: var(--navy);
    background: var(--pale); border: 1.5px solid var(--border);
    border-radius: 10px; outline: none; text-align: center; box-sizing: border-box;
  }
  .edit-inp:focus { border-color: var(--navy-mid); background: var(--white); }

  /* ADMIN BODY */
  .adm-body { padding: 14px 16px 60px; max-width: 460px; margin: 0 auto; }
  .btn-ref {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 14px; font-size: 13px;
    font-family: "Pretendard", sans-serif; font-weight: 600;
    color: var(--navy); background: var(--pale);
    border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; margin-bottom: 14px;
  }
  .adm-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .adm-card-top {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 8px;
  }
  .adm-svc  { font-size: 15px; font-weight: 700; color: var(--navy); }
  .adm-date { font-size: 11px; color: var(--ink-s); margin-top: 2px; }
  .adm-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .badge {
    background: var(--pale); border-radius: 6px;
    padding: 4px 10px; font-size: 12px;
    color: var(--navy); font-weight: 600;
  }
  .adm-sig  { font-size: 12px; color: var(--ink-s); }
  .adm-acts {
    display: flex; gap: 8px;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--pale);
  }
  .btn-del {
    flex: 1; padding: 8px;
    font-size: 13px; font-family: "Pretendard", sans-serif;
    font-weight: 600; color: var(--red);
    background: #FEF2F2; border: 1px solid #FECACA;
    border-radius: 8px; cursor: pointer;
  }
  .adm-empty {
    text-align: center; padding: 50px 20px;
    color: var(--ink-s); font-size: 14px; line-height: 1.8;
  }
</style>
</head>

// ── 보스턴 날짜 자동설정 ──
(function setBostonDate() {
  const now = new Date();
  const bos = new Intl.DateTimeFormat("ko-KR", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit"
  }).formatToParts(now);
  const p = {};
  bos.forEach(x => p[x.type] = x.value);
  document.getElementById("reportDate").value = p.year + "년 " + p.month + "월 " + p.day + "일";
  
  // 예배날짜 기본값도 오늘
  const y = p.year, m = p.month, d = p.day;
  document.getElementById("worshipDate").value = y + "-" + m + "-" + d;
})();

// ── 인원수 필드 동적 변경 ──
const SERVICE_2 = ["새벽"];
const SERVICE_3 = ["예꿈", "꿈땅", "중등부", "고등부"];
const SERVICE_4 = ["금요여성"]; // 현장 + 줌

function sanitizeNatural(el) {
  // 자연수(0 포함)만 허용 — 소수점, 음수, 문자 제거
  let v = el.value.replace(/[^0-9]/g, "");
  if (v.length > 1) v = v.replace(/^0+/, "") || "0";
  el.value = v;
}

function updateCountFields() {
  const svc = document.getElementById("serviceType").value;
  const wrap = document.getElementById("countWrap");
  const inp  = `type="number" min="0" step="1" pattern="[0-9]*" inputmode="numeric" placeholder="0"`;

  if (SERVICE_2.includes(svc)) {
    wrap.className = "cnt-grid g2-total";
    wrap.innerHTML = `
      <div class="cnt-item"><label>현장</label><input class="cnt-inp sub-inp" id="cnt_onsite"  ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item"><label>온라인</label><input class="cnt-inp sub-inp" id="cnt_online" ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item cnt-total-row"><label>합계</label><input class="cnt-inp cnt-total-disp" id="cnt_total" type="text" readonly placeholder="0"></div>`;
  } else if (SERVICE_4.includes(svc)) {
    wrap.className = "cnt-grid g2-total";
    wrap.innerHTML = `
      <div class="cnt-item"><label>현장</label><input class="cnt-inp sub-inp" id="cnt_onsite"  ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item"><label>온라인</label><input class="cnt-inp sub-inp" id="cnt_online" ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item cnt-total-row"><label>합계</label><input class="cnt-inp cnt-total-disp" id="cnt_total" type="text" readonly placeholder="0"></div>`;
  } else if (SERVICE_3.includes(svc)) {
    wrap.className = "cnt-grid g3-total";
    wrap.innerHTML = `
      <div class="cnt-item"><label>학생</label><input class="cnt-inp sub-inp" id="cnt_student" ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item"><label>교사</label><input class="cnt-inp sub-inp" id="cnt_teacher" ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item"><label>그외</label><input class="cnt-inp sub-inp" id="cnt_other"   ${inp} oninput="sanitizeNatural(this);calcTotal()"></div>
      <div class="cnt-item cnt-total-row"><label>합계</label><input class="cnt-inp cnt-total-disp" id="cnt_total" type="text" readonly placeholder="0"></div>`;
  } else {
    wrap.className = "cnt-grid g1";
    wrap.innerHTML = `
      <div class="cnt-item"><label>총 인원</label><input class="cnt-inp" id="cnt_total" ${inp} oninput="sanitizeNatural(this)"></div>`;
  }
}

// ── 합계 자동계산 ──
function calcTotal() {
  const ids = ["cnt_onsite","cnt_online","cnt_student","cnt_teacher","cnt_other"];
  let sum = 0;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) sum += parseInt(el.value || 0) || 0;
  });
  const disp = document.getElementById("cnt_total");
  if (disp) disp.value = sum > 0 ? sum + "명" : "";
}

async function submitForm() {
  const reportDate  = document.getElementById("reportDate").value;
  const worshipDate = document.getElementById("worshipDate").value;
  const service     = document.getElementById("serviceType").value;
  const sig         = document.getElementById("signature").value.trim();
  const svc         = service;

  if (!worshipDate) return showToast("예배 날짜를 선택해주세요", "err");
  if (!service)     return showToast("예배를 선택해주세요", "err");
  if (!sig)         return showToast("서명을 입력해주세요", "err");

  // collect counts
  let total=0, onsite=0, online=0, student=0, teacher=0, other=0;
  if (SERVICE_2.includes(svc) || SERVICE_4.includes(svc)) {
    onsite  = parseInt(document.getElementById("cnt_onsite")?.value  || 0) || 0;
    online  = parseInt(document.getElementById("cnt_online")?.value  || 0) || 0;
    total   = onsite + online;
  } else if (SERVICE_3.includes(svc)) {
    student = parseInt(document.getElementById("cnt_student")?.value || 0) || 0;
    teacher = parseInt(document.getElementById("cnt_teacher")?.value || 0) || 0;
    other   = parseInt(document.getElementById("cnt_other")?.value   || 0) || 0;
    total   = student + teacher + other;
  } else {
    total   = parseInt(document.getElementById("cnt_total")?.value   || 0) || 0;
  }

  const payload = {
    action: "submit", reportDate, worshipDate, service,
    total, onsite, online, student, teacher, other, signature: sig
  };

  // ── 중복 제출 체크 (3초 타임아웃) ──
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=출석보고`;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3000);
    const res  = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    const text = await res.text();
    const rows = parseCSV(text).slice(1);
    const dup  = rows.find(r => {
      const d = (r[2] || "").replace(/"/g,"").trim();
      const s = (r[3] || "").replace(/"/g,"").trim();
      return d === worshipDate && s === service;
    });
    if (dup) {
      const [y,m,d] = worshipDate.split("-");
      const fmtDate = `${y}. ${m}. ${d}`;
      const msg = `이미 제출된 ${fmtDate}, ${service} 예배에 인원수가 존재합니다. 수정하시겠습니까?`;
      showDupModal(msg, () => doSubmit(payload, sig, worshipDate, service, total));
      return;
    }
  } catch(e) {
    // 타임아웃 또는 오류 시 중복 체크 건너뛰고 바로 제출
  }

  doSubmit(payload, sig, worshipDate, service, total);
}

function doSubmit(payload, sig, worshipDate, service, total) {
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "제출 중...";

  // GET 방식으로 전송 (CORS 문제 없음)
  const params = new URLSearchParams({
    action:      payload.action,
    reportDate:  payload.reportDate  || "",
    worshipDate: payload.worshipDate || "",
    service:     payload.service     || "",
    total:       payload.total       || 0,
    onsite:      payload.onsite      || 0,
    online:      payload.online      || 0,
    student:     payload.student     || 0,
    teacher:     payload.teacher     || 0,
    other:       payload.other       || 0,
    signature:   payload.signature   || ""
  });
  const url = SCRIPT_URL + "?" + params.toString();

  const img = new Image();
  img.onload = img.onerror = function() {
    btn.disabled = false;
    btn.textContent = "제출하기";
    showSuccess(payload.reportDate, worshipDate, service, total, sig);
  };
  img.src = url;

  // 5초 후에도 응답 없으면 성공으로 처리 (Apps Script 특성상 오래 걸릴 수 있음)
  setTimeout(function() {
    if (btn.disabled) {
      btn.disabled = false;
      btn.textContent = "제출하기";
      showSuccess(payload.reportDate, worshipDate, service, total, sig);
    }
  }, 5000);
}

// ── 보고서 작성 ──
async function generateReport() {
  const start  = document.getElementById("rptStart").value;
  const end    = document.getElementById("rptEnd").value;
  const status = document.getElementById("rptStatus");
  const btn    = document.getElementById("rptBtn");

  if (!start) return showToast("시작 날짜를 선택해주세요", "err");
  if (!end)   return showToast("종료 날짜를 선택해주세요", "err");
  if (start > end) return showToast("날짜 범위를 확인해주세요", "err");

  btn.disabled = true;
  btn.textContent = "작성 중...";
  status.innerHTML = `<div class="rpt-status">구글 문서 생성 중입니다. 잠시만 기다려주세요... (최대 30초)</div>`;

  const url = `${SCRIPT_URL}?action=report&pw=${encodeURIComponent(ADMIN_PW)}&startDate=${start}&endDate=${end}`;

  try {
    const res = await fetch(url, {
      method: "GET",
      redirect: "follow"
    });

    const text = await res.text();

    // JSON 파싱 시도
    let json;
    try {
      json = JSON.parse(text);
    } catch(pe) {
      // 텍스트에 docUrl이 직접 들어있는 경우 파싱
      const urlMatch = text.match(/https:\/\/docs\.google\.com\/document\/[^\s"<>]+/);
      if (urlMatch) {
        status.innerHTML = `<a class="rpt-link" href="${urlMatch[0]}" target="_blank">📄 보고서 열기 →</a>`;
        btn.disabled = false;
        btn.textContent = "작성";
        return;
      }
      throw new Error("응답 파싱 실패: " + text.slice(0, 100));
    }

    if (json.success && json.docUrl) {
      status.innerHTML = `<a class="rpt-link" href="${json.docUrl}" target="_blank">📄 보고서 열기 →</a>`;
    } else {
      status.innerHTML = `<div class="rpt-status" style="color:var(--red);">생성 실패: ${json.message || "다시 시도해주세요"}</div>`;
    }
  } catch(e) {
    status.innerHTML = `<div class="rpt-status" style="color:var(--red);">오류: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "작성";
  }
}

// ── 달력 전역 상태 ──
const ALL_SERVICES = ["주일 1부","주일 2부","새벽","수요","예꿈","꿈땅","중등부","고등부","이음","위윈","위윈EM","금요여성"];
const SVC2 = ["새벽"];
const SVC3 = ["예꿈","꿈땅","중등부","고등부"];
const SVC4 = ["금요여성"];
let _calYear, _calMonth, _allRows = [], _selectedDate = null;
const DAYS_KO = ["일","월","화","수","목","금","토"];

// ── 달력 로드 (시트 전체 데이터 불러와서 그리기) ──
async function loadCalendar(year, month) {
  _calYear  = year;
  _calMonth = month;
  document.getElementById("calTitle").textContent =
    year + "년 " + String(month+1).padStart(2,"0") + "월";
  document.getElementById("calGrid").innerHTML =
    "<div style='grid-column:1/-1;text-align:center;padding:20px;color:#556789;font-size:13px;'>불러오는 중...</div>";
  document.getElementById("dateSummary").innerHTML = "";

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=출석보고`;
    const res  = await fetch(url);
    const text = await res.text();
    _allRows = parseCSV(text).slice(1); // 헤더 제외, 전체 보관
    renderCalendar(year, month);
  } catch(e) {
    document.getElementById("calGrid").innerHTML =
      "<div style='grid-column:1/-1;text-align:center;padding:20px;color:#C0392B;'>불러오기 실패</div>";
  }
}

function changeMonth(delta) {
  let y = _calYear, m = _calMonth + delta;
  if (m > 11) { y++; m = 0; }
  if (m < 0)  { y--; m = 11; }
  _selectedDate = null;
  loadCalendar(y, m);
}

// ── 달력 그리기 ──
function renderCalendar(year, month) {
  // 날짜별 집계 map: "yyyy-mm-dd" → {count, total}
  const dayMap = {};
  _allRows.forEach(row => {
    const d = (row[2] || "").replace(/"/g,"").trim();
    if (!d) return;
    const dt = new Date(d);
    if (dt.getFullYear() === year && dt.getMonth() === month) {
      if (!dayMap[d]) dayMap[d] = { count: 0, total: 0 };
      dayMap[d].count++;
      dayMap[d].total += parseInt(row[4]) || 0;
    }
  });

  const today = new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York" }).format(new Date());
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const lastDate = new Date(year, month+1, 0).getDate();

  let html = "";
  // 요일 헤더
  ["일","월","화","수","목","금","토"].forEach(d => {
    html += `<div class="cal-dow">${d}</div>`;
  });
  // 빈칸
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  // 날짜
  for (let d = 1; d <= lastDate; d++) {
    const dk    = year + "-" + String(month+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const dow   = (firstDay + d - 1) % 7;
    const info  = dayMap[dk];
    const isToday    = dk === today;
    const isSelected = dk === _selectedDate;
    let cls = "cal-day";
    if (dow === 0) cls += " cal-day-sun";
    if (dow === 6) cls += " cal-day-sat";
    if (isToday)    cls += " today";
    if (isSelected) cls += " selected";

    let badge = "";
    if (info) {
      badge = `<div class="cal-cnt-tag">${info.count}건</div><div class="cal-badge">${info.total}명</div>`;
    }
    html += `<div class="${cls}" onclick="selectDate('${dk}')">
      <div class="cal-dn">${d}</div>${badge}
    </div>`;
  }

  document.getElementById("calGrid").innerHTML = html;

  // 선택된 날짜가 있으면 요약 다시 표시
  if (_selectedDate) renderDateSummary(_selectedDate);
}

// ── 날짜 선택 ──
function selectDate(dk) {
  _selectedDate = dk;
  renderCalendar(_calYear, _calMonth);
}

// ── 날짜별 출석 현황 표 ──
function renderDateSummary(dk) {
  const data = _allRows.filter(r => (r[2]||"").replace(/"/g,"").trim() === dk);
  const map  = {};
  // rowIndex는 시트에서의 실제 행 번호(1-based, 헤더 포함) → _allRows index + 2
  _allRows.forEach((r, i) => {
    const rd = (r[2]||"").replace(/"/g,"").trim();
    const rs = (r[3]||"").replace(/"/g,"").trim();
    if (rd === dk) map[rs] = { row: r, sheetRow: i + 2 };
  });

  const [Y,M,D] = dk.split("-");
  const dt  = new Date(dk);
  const dateLabel = `${Y}년 ${M}월 ${D}일 (${DAYS_KO[dt.getDay()]})`;

  let totalAll = 0;
  let rows_html = "";

  ALL_SERVICES.forEach(svc => {
    const entry = map[svc];
    if (!entry) {
      rows_html += `<div class="sum-row">
        <span class="sum-svc">${svc}</span>
        <span class="sum-missing">미제출</span>
      </div>`;
      return;
    }
    const row      = entry.row;
    const sheetRow = entry.sheetRow;
    const total    = parseInt(row[4]) || 0;
    const onsite   = parseInt(row[5]) || 0;
    const online   = parseInt(row[6]) || 0;
    const student  = parseInt(row[7]) || 0;
    const teacher  = parseInt(row[8]) || 0;
    const other    = parseInt(row[9]) || 0;
    const sig      = (row[10]||"").replace(/"/g,"").trim();
    totalAll += total;

    let detail = "";
    if (SVC2.includes(svc)||SVC4.includes(svc)) detail = `현장 ${onsite}  온라인 ${online}`;
    else if (SVC3.includes(svc)) detail = `학생 ${student}  교사 ${teacher}  그외 ${other}`;

    // 수정/삭제 버튼에 필요한 데이터를 JSON으로 인코딩
    const rowData = encodeURIComponent(JSON.stringify({
      sheetRow, svc, dk, total, onsite, online, student, teacher, other, sig
    }));

    rows_html += `<div class="sum-row">
      <div class="sum-svc">${svc}<br><span class="sum-sig">✍️ ${sig}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div>
          ${detail ? `<div class="sum-detail">${detail}</div>` : ""}
          <div class="sum-cnt">${total}명</div>
        </div>
        <div class="sum-acts">
          <button class="btn-edit" onclick="openEditModal('${rowData}')">수정</button>
          <button class="btn-del-sm" onclick="openDelModal('${rowData}')">삭제</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById("dateSummary").innerHTML = `
    <div class="sum-card">
      <div class="sum-card-hdr">📅 ${dateLabel} 예배 출석 현황</div>
      ${rows_html}
      <div class="sum-total-row">
        <span class="sum-svc">전체 합계</span>
        <span class="sum-cnt">${totalAll}명</span>
      </div>
    </div>`;

  // 스크롤
  setTimeout(() => document.getElementById("dateSummary").scrollIntoView({ behavior: "smooth", block: "start" }), 100);
}

// ── 수정 모달 ──
function openEditModal(encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  const svc = d.svc;

  document.getElementById("editTitle").textContent = "✏️ " + svc + " 인원수 수정";

  const inp = (id, label, val) => `
    <div class="edit-item">
      <label>${label}</label>
      <input class="edit-inp" id="ei_${id}" type="number" min="0" step="1"
        inputmode="numeric" value="${val}"
        oninput="this.value=this.value.replace(/[^0-9]/g,'');editCalcTotal()">
    </div>`;

  let fields = "", cols = "g1";

    cols = "g2";

    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length <= 1) {
      cards.innerHTML = "<div class=\"adm-empty\">데이터가 없습니다.</div>"; return;
    }
    cards.innerHTML = "";
    // rows[0] = header, rows[1..] = data (newest first)
    const data = rows.slice(1).reverse();
    data.forEach((row, i) => {
      const realIdx = rows.length - 1 - i; // 1-based row in sheet
      const ts      = row[0] || "";
      const repDate = row[1] || "";
      const wDate   = row[2] || "";
      const svc     = row[3] || "";
      const total   = row[4] || "";
      const onsite  = row[5] || "";
      const online  = row[6] || "";
      const student = row[7] || "";
      const teacher = row[8] || "";
      const other   = row[9] || "";
      const sig     = row[10] || "";

      // build badges
      let badges = "";
      if (onsite || online) {
        if (onsite)  badges += `<span class="badge">현장 \${onsite}명</span>`;
        if (online)  badges += `<span class="badge">온라인 \${online}명</span>`;
      } else if (student || teacher || other) {
        if (student) badges += `<span class="badge">학생 \${student}명</span>`;
        if (teacher) badges += `<span class="badge">교사 \${teacher}명</span>`;
        if (other)   badges += `<span class="badge">그외 \${other}명</span>`;
      } else {
        badges += `<span class="badge">총 \${total}명</span>`;
      }

      const card = document.createElement("div");
      card.className = "adm-card";
      card.innerHTML = `
        <div class="adm-card-top">
          <div>
            <div class="adm-svc">\${svc}</div>
            <div class="adm-date">예배일 \${wDate} · 보고일 \${repDate}</div>
          </div>
        </div>
        <div class="adm-badges">\${badges}</div>
        <div class="adm-sig">✍️ \${sig}</div>
        <div class="adm-acts">
          <button class="btn-del" onclick="deleteRow(\${realIdx}, this)">삭제</button>
        </div>`;
      cards.appendChild(card);
    });
  } catch(e) {
    cards.innerHTML = "<div class=\"adm-empty\">불러오기 실패</div>";
  }
}



// ── CSV PARSER ──
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = "", inQ = false;
    for (let ci = 0; ci < line.length; ci++) {
      const ch = line[ci];
      if (ch === '"' && !inQ) { inQ = true; }
      else if (ch === '"' && inQ) {
        if (line[ci+1] === '"') { cur += '"'; ci++; }
        else inQ = false;
      } else if (ch === "," && !inQ) { cols.push(cur); cur = ""; }
      else cur += ch;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}
